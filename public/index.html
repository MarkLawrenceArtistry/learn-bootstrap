<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.8/css/dataTables.dataTables.min.css">
    <script type="importmap">
    {
        "imports": {
            "datatables.net-dt": "https://cdn.datatables.net/2.0.8/js/dataTables.mjs",
            "jquery": "https://cdn.jsdelivr.net/npm/jquery@3.7.1/+esm"
        }
    }
    </script>
</head>
<body>
    
    <div class="content">
        <div class="form-wrapper">
            <!-- FORM -->
            <form id="user-form">
                <h1 id="user-form-title">Create user</h1>
                <input type="text" id="user-id" style="display: none;">
                <div>
                    <label>Username</label>
                    <input type="text" id="user-username" required>
                </div>
                <div>
                    <label>Password</label>
                    <input type="password" id="user-password" required>
                </div>
                <div>
                    <button>Submit</button>
                </div>
            </form>
            <button onclick="document.querySelector('#user-form').reset()">Reset Form</button>
        </div>

        <!-- DISPLAY -->
        <div class="table-wrapper">
            <table id="users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Created At</th>
                        <th>Actions</th>
                    </tr>
                </thead>
            </table>
        </div>
    </div>
    
    <script type="module" src="./js/main.js"></script>
</body>
</html>
