<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-primary">
        <div class="container-fluid">
            <!-- Logo -->
            <a href="#" class="navbar-brand text-white">
                <img src="https://getbootstrap.com/docs/5.3/assets/brand/bootstrap-logo.svg" class="d-inline-block align-text-top" alt="Bootstrap" width="30" height="24"> User Form
            </a>

            <!-- Hamburger Icon -->
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Basic Nav Link -->
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link active text-light" href="#" aria-current="page">Home</a></li>
                    <li class="nav-item"><a href="#" class="nav-link text-light">Dashboard</a></li>
                    <li class="nav-item"><a href="#" class="nav-link text-light">Contact</a></li>
                    <li class="nav-item"><a href="#" class="nav-link text-light">Glossary</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-light" href="#" data-bs-toggle="dropdown">Languages</a>
                        <ul class="dropdown-menu">
                            <li><a href="#" class="dropdown-item">HTML CSS JS</a></li>
                            <li><a href="#" class="dropdown-item">NodeJS & Express</a></li>
                            <div class="dropdown-divider"></div>
                            <li><a href="#" class="dropdown-item">SQLite3</a></li>
                        </ul>
                    </li>
                </ul>
            </div>

            <!-- Search -->
            <form class="d-flex" role="search">
                <input type="search" class="form-control" placeholder="Search" aria-label="Search">
                <button class="btn btn-outline-light ms-2" type="submit">Search</button>
            </form>
        </div>
    </nav>
    <div class="container">
        <div class="row p-5">
            <div class="col">
                <form>
                    <div class="mb-3">
                        <h1 class="text-black fw-bold">Create your account</h1>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" placeholder="Type your usename here..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" placeholder="Type your password here..." required>
                        <div class="form-text">Passwords must be 8 characters long.</div>
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" placeholder="Type your first name here..." required>
                        </div>

                        <div class="col">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" placeholder="Type your last name here..." required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Gender</label>
                        <select class="form-select">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="mature">
                            <label class="form-check-label" for="mature">18 Above</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <button class="btn btn-primary w-100">Submit</button>
                    </div>
                </form>
            </div>

            <div class="col">
                <h1 class="text-primary">Table here later</h1>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
